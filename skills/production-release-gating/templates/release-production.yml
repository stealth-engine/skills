name: Production Release
# [AUTOMATED] Deploys to production when a GitHub Release is PUBLISHED.
#
# The GitHub Release (created by semantic-release) is the trigger — nothing
# deploys on a plain push to main. This is the "Release-Triggered Deploy" gate; use
# it when YOU control the deploy workflow (GKE, self-hosted, any dispatchable target,
# or a platform CLI). On Vercel/Netlify you must also disable native push-deploy on
# main (see the SKILL.md note), or prefer the Promotion Branch / Build-Skip Gate.

on:
  release:
    types: [published]

concurrency:
  group: prod-release-${{ github.event.release.tag_name }}
  cancel-in-progress: false # never cancel a production rollout

permissions:
  contents: write # to annotate the Release with deploy status

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # don't hold the prod-release concurrency slot if a rollout hangs
    steps:
      - uses: actions/checkout@v7

      - name: Deploy to production
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          echo "Deploying $VERSION to production…"
          # e.g. authenticate to GKE and roll out the tagged image:
          #   gcloud container clusters get-credentials "$CLUSTER" --region "$REGION"
          #   kubectl set image deployment/app app="$REGISTRY/app:${VERSION#v}"
          #   kubectl rollout status deployment/app --timeout=300s

      - name: Annotate the Release with deploy status
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- deploy-status -->';
            const status = ok
              ? `\n\n${marker}\n✅ **Deployed to production** · [run](${run})`
              : `\n\n${marker}\n❌ **Production deploy failed** · [run](${run})`;
            const { data: rel } = await github.rest.repos.getRelease({
              owner: context.repo.owner, repo: context.repo.repo,
              release_id: context.payload.release.id,
            });
            // Replace a prior status block (idempotent across re-runs) instead of stacking.
            const cleaned = (rel.body || '').replace(
              new RegExp(`\\n\\n${marker}[\\s\\S]*$`), ''
            );
            await github.rest.repos.updateRelease({
              owner: context.repo.owner, repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: cleaned + status,
            });
