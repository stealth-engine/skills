name: Code Complexity Stats
# [AUTOMATED] Posts scc + COCOMO code statistics as a sticky comment on every PR.
#
# Deliberately independent of any [skip ci] / [skip release] markers — these
# stats are informational and should always refresh on new commits.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# A PR comment is posted via the Issues API. `pull-requests: write` is enough to
# create/update it; `issues: write` is included belt-and-suspenders.
permissions:
  contents: read
  pull-requests: write
  issues: write

# One run per PR; a newer push cancels the older, still-running analysis.
concurrency:
  group: code-complexity-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  code-complexity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install scc
        run: |
          # Pin a version for reproducibility — bump deliberately, don't track
          # "latest" (a silent format change would change every PR comment).
          # Match the tarball to the runner arch: x86_64 here; use arm64 on
          # ARM runners (e.g. ubuntu-24.04-arm).
          SCC_VERSION="3.7.0"
          wget -qO- "https://github.com/boyter/scc/releases/download/v${SCC_VERSION}/scc_Linux_x86_64.tar.gz" | tar xz
          chmod +x scc
          sudo mv scc /usr/local/bin/

      - name: Run scc
        run: |
          # COCOMO cost/effort estimate is driven by --avg-wage (ANNUAL, in
          # whatever currency you want the dollar figure read as).
          # 360000 = HKD 30,000/month average developer salary.
          # scc already honours .gitignore; --exclude-dir is belt-and-suspenders
          # for build output that isn't ignored.
          scc \
            --exclude-dir .git,node_modules,build,dist,.next,.turbo,out \
            --avg-wage 360000 \
            > scc-output.txt

      - name: Post sticky PR comment
        uses: actions/github-script@v9
        with:
          # Prefer a bot/PAT secret if you have one; else the built-in token.
          github-token: ${{ secrets.GH_TOKEN || github.token }}
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('scc-output.txt', 'utf8');

            // GitHub caps comment bodies at 65,536 chars; leave room for the
            // wrapper so a huge --by-file run can't 422 the whole step.
            const MAX = 64000;
            const output =
              raw.length > MAX
                ? raw.slice(0, MAX) + '\n…truncated (exceeded GitHub comment limit)'
                : raw;

            // Hidden marker identifies our comment so we update (not duplicate) it.
            const marker = '<!-- code-complexity -->';
            const body = [
              marker,
              '## 📊 Code Complexity Analysis',
              '',
              '```',
              output,
              '```',
              '',
              '_Generated by [scc](https://github.com/boyter/scc) (Sloc, Cloc and Code)._',
              '_💰 COCOMO cost estimate in HKD, assuming HKD 30,000/month average salary._',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            // Paginate — a PR can have more comments than one page, and the
            // sticky comment might be on a later page.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
