name: Branch Name Validation
# [AUTOMATED] Enforces branch naming on PRs: feature/fix/hotfix + AI-agent prefixes.

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: branch-check-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        id: check
        env:
          BRANCH: ${{ github.head_ref }} # via env, never inline in run: (injection)
        run: |
          if [[ "$BRANCH" =~ ^(feature|fix|hotfix|claude|cursor|codex|copilot|codegen-bot|dependabot)/.+ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment if invalid
        if: steps.check.outputs.valid == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- branch-name-check -->';
            const branch = process.env.HEAD_REF;
            const body = `${marker}
            ## 🌿 Invalid branch name

            \`${branch}\` must start with one of:

            - \`feature/\` · \`fix/\` · \`hotfix/\`
            - or an AI-agent prefix: \`claude/\` \`cursor/\` \`codex/\` \`copilot/\` \`codegen-bot/\` \`dependabot/\`

            e.g. \`feature/add-locale-toggle\`.`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });
        env:
          HEAD_REF: ${{ github.head_ref }}

      - name: Fail if invalid
        if: steps.check.outputs.valid == 'false'
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "::error::Invalid branch name '$BRANCH' — see the PR comment."
          exit 1
